main_root_dir: artifacts

DataIngestion:
  root_dir: artifacts/data_ingestion
  source_url: 'stacked-summaries/stacked-samsum-1024'
  train_csv: artifacts/data_ingestion/train.csv
  test_csv: artifacts/data_ingestion/test.csv
  validation_csv: artifacts/data_ingestion/validation.csv

DataValidation:
  validation_dir: artifacts/data_validation
  valid_train_csv: artifacts/data_validation/valid_train.csv
  valid_test_csv: artifacts/data_validation/valid_test.csv
  valid_report: artifacts/data_validation/valid_report.json
  valid_status: FALSE
  
DataTransformation:
  root_dir: artifacts/data_transformation
  transformed_train_csv: artifacts/data_transformation/train
  transformed_test_csv: artifacts/data_transformation/test
  tokenizer_name: google/pegasus-cnn_dailymail

ModelTrainer:
  root_dir: artifacts/model_trainer
  model_path: artifacts/model_trainer/model
  model_ckpt: google/pegasus-cnn_dailymail